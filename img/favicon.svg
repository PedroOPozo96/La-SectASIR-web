<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo azul oscuro de la web con borde azul acento -->
  <rect width="100" height="100" rx="20" fill="#121F35" stroke="#3FA9F5" stroke-width="4"/>
  
  <!-- Los tres botones de la ventana en tonos celestes y blancos -->
  <circle cx="20" cy="20" r="5" fill="#3FA9F5" />
  <circle cx="35" cy="20" r="5" fill="#6FE3F0" />
  <circle cx="50" cy="20" r="5" fill="#EAF2FB" />
  
  <!-- Las letras SA (SectASIR) centradas y a dos colores -->
  <text x="50" y="76" font-family="sans-serif" font-size="50" font-weight="800" text-anchor="middle">
    <tspan fill="#EAF2FB">S</tspan><tspan fill="#3FA9F5">A</tspan>
  </text>
</svg>
