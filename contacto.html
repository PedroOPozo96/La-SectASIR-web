<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<link rel="icon" type="image/svg+xml" href="img/favicon.svg?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* Estilos específicos para el editor Nano */
  .nano-editor {
    background: #0f172a;
    color: #cbd5e1;
    font-family: var(--mono, 'JetBrains Mono', monospace);
    display: flex;
    flex-direction: column;
    height: 60vh;
    min-height: 400px;
    margin: 0;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    overflow: hidden;
  }
  .nano-header {
    background: #e2e8f0;
    color: #0f172a;
    padding: 4px 16px;
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    font-size: 0.95rem;
  }
  .nano-body {
    padding: 16px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .nano-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nano-input-row span {
    color: #60a5fa;
    font-weight: 600;
  }
  .nano-input {
    background: transparent;
    border: none;
    color: #f8fafc;
    font-family: inherit;
    font-size: 1rem;
    flex-grow: 1;
    outline: none;
  }
  .nano-textarea {
    background: transparent;
    border: none;
    color: #f8fafc;
    font-family: inherit;
    font-size: 1rem;
    flex-grow: 1;
    outline: none;
    resize: none;
    margin-top: 16px;
  }
  .nano-shortcuts {
    background: #1e293b;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    font-size: 0.9rem;
  }
  .nano-shortcut {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #cbd5e1;
    cursor: pointer;
    transition: color 0.2s;
    text-decoration: none;
  }
  .nano-shortcut:hover {
    color: #f8fafc;
  }
  .nano-shortcut span {
    background: #f8fafc;
    color: #0f172a;
    padding: 0 4px;
    border-radius: 2px;
    font-weight: bold;
  }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <a href="index.html" class="nav-brand">
      La <span class="brand-accent">SectASIR</span>
      <img src="img/favicon.svg" alt="Logo SectASIR" width="28" height="28" class="nav-logo">
    </a>
    <div class="nav-links">
      <a href="sobre-mi.html">sobre-mi</a>
      <a href="index.html#practicas">practicas</a>
      <a href="contacto.html">contacto</a>
    </div>
  </div>
</nav>

<section class="section" style="padding-top: 40px;">
  <div class="wrap">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 900px; margin: 0 auto;">
      
      <!-- Ventana principal con ID activado -->
      <div id="main-terminal" class="terminal-window" style="box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%;">
        <div class="terminal-titlebar">
          <span class="tb-dot r" id="close-terminal-btn" title="Cerrar y volver a inicio"></span><span class="tb-dot y"></span><span class="tb-dot g"></span>
          <span>bash - send_email.sh</span>
        </div>
        
        <!-- Simulador de Nano -->
        <div class="nano-editor">
          
          <div class="nano-header">
            <span>GNU nano 7.2</span>
            <span>Nuevo Mensaje</span>
            <span></span>
          </div>

          <div class="nano-body">
            <div class="nano-input-row">
              <span>Para:</span>
              <span style="color: #94a3b8; font-weight: normal;">pedro.oliver [at] asir.com</span>
            </div>
            <div class="nano-input-row" style="border-bottom: 1px solid #334155; padding-bottom: 8px;">
              <span>Asunto:</span>
              <input type="text" id="email-subject" class="nano-input" placeholder="Escribe el asunto de tu mensaje...">
            </div>
            
            <textarea id="email-body" class="nano-textarea" placeholder="Redacta tu mensaje aquí..."></textarea>
          </div>

          <!-- Botonera inferior de atajos -->
          <div class="nano-shortcuts">
            <div class="nano-shortcut" style="cursor: default;"><span>^G</span> Ayuda</div>
            <div class="nano-shortcut" style="cursor: default;"><span>^O</span> Guardar</div>
            
            <!-- Botón Salir (Simula el botón rojo) -->
            <a href="index.html" id="nano-exit" class="nano-shortcut"><span>^X</span> Salir</a>
            
            <!-- Botón Enviar (Lanza el script) -->
            <a href="#" onclick="sendNanoEmail(); return false;" class="nano-shortcut"><span>^S</span> Enviar Email</a>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>

<footer>
  <span style="color: #4ade80;">pedrooliver@asir</span>:<span style="color: #60a5fa;">~/la_sectasir</span> <span style="color: #c084fc;">(admin)</span>$ echo "La SectASIR — gracias por pasarte" — última actualización: junio 2026
</footer>

<script src="js/practicas-data.js"></script>
<script src="js/render.js"></script>

<!-- Script para el editor Nano interactivo -->
<script>
  function sendNanoEmail() {
    const subject = document.getElementById('email-subject').value;
    const body = document.getElementById('email-body').value;
    
    // Hash de tu correo (actualmente: mailto:tu-email@ejemplo.com)
    // Para poner el tuyo propio: abre la consola del navegador y teclea btoa('mailto:tu-correo@gmail.com') y pégalo aquí
    const target = atob('bWFpbHRvOnR1LWVtYWlsQGVqZW1wbG8uY29t'); 
    
    const mailtoUrl = target + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    window.location.href = mailtoUrl;
  }

  // Atajos de teclado reales para los más frikis
  document.addEventListener('keydown', function(event) {
    // Si pulsa Ctrl+S
    if (event.ctrlKey && event.key === 's') {
      event.preventDefault(); // Evita que el navegador intente guardar la página web
      sendNanoEmail();
    }
    // Si pulsa Ctrl+X
    if (event.ctrlKey && event.key === 'x') {
      event.preventDefault();
      document.getElementById('close-terminal-btn').click(); // Dispara la animación de salida
    }
  });

  // Hacemos que el botón ^X de abajo use también la animación del botón rojo
  document.getElementById('nano-exit').addEventListener('click', function(e) {
    e.preventDefault();
    const closeBtn = document.getElementById('close-terminal-btn');
    if(closeBtn) closeBtn.click();
  });
</script>

</body>
</html>
