<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto — La SectASIR</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div class="wrap">
    <a href="index.html" class="nav-brand">
      La <span class="brand-accent">SectASIR</span>
      <img src="img/favicon.svg" alt="Logo SectASIR" width="28" height="28" class="nav-logo">
    </a>
    <div class="nav-links">
      <a href="sobre-mi.html">sobre-mi</a>
      <a href="index.html#practicas">practicas</a>
      <a href="contacto.html">contacto</a>
    </div>
  </div>
</nav>

<section class="section" style="padding-top: 40px;">
  <div class="wrap">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 900px; margin: 0 auto;">
      
      <form action="https://formspree.io/f/xpqgqpkg" method="POST" id="main-terminal" class="terminal-window" style="box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; border: none;">
        
        <input type="hidden" name="_next" value="https://pedroopozo96.github.io/La-SectASIR-web/contacto.html">

        <div class="terminal-titlebar">
          <span class="tb-dot r" id="close-terminal-btn" title="Cerrar y volver a inicio"></span><span class="tb-dot y"></span><span class="tb-dot g"></span>
          <span>bash - send_email.sh</span>
        </div>
        
        <div class="nano-editor">
          <div class="nano-header">
            <span>GNU nano 7.2</span>
            <span>Nuevo Mensaje</span>
          </div>

          <div class="nano-body">
            <div class="nano-input-row">
              <span>Para:</span>
              <span style="color: #94a3b8;">pedro.oliver [at] asir.com</span>
            </div>
            <div class="nano-input-row">
              <span>De:</span>
              <input type="email" name="_replyto" class="nano-input" placeholder="Tu correo electrónico..." required>
            </div>
            <div class="nano-input-row" style="border-bottom: 1px solid #334155; padding-bottom: 8px;">
              <span>Asunto:</span>
              <input type="text" name="subject" id="email-subject" class="nano-input" placeholder="Asunto del mensaje..." required>
            </div>
            
            <textarea name="message" id="email-body" class="nano-textarea" placeholder="Redacta tu mensaje aquí..." required></textarea>
          </div>

          <div class="nano-shortcuts">
            <div class="nano-shortcut"><span>^G</span> Ayuda</div>
            <div class="nano-shortcut"><span>^O</span> Guardar</div>
            <a href="index.html" id="nano-exit" class="nano-shortcut"><span>^X</span> Salir</a>
            <button type="submit" class="nano-shortcut" style="background: none; border: none; font-family: inherit; font-size: inherit;"><span>^S</span> Enviar Email</button>
          </div>
        </div>
      </form>

    </div>
  </div>
</section>

<footer>
  <span style="color: #4ade80;">pedrooliver@asir</span>:<span style="color: #60a5fa;">~/la_sectasir</span> <span style="color: #c084fc;">(admin)</span>$ echo "La SectASIR — gracias por pasarte"
</footer>

<script src="js/render.js"></script>
<script>
  document.addEventListener('keydown', function(event) {
    if (event.ctrlKey && event.key === 's') {
      event.preventDefault();
      document.querySelector('form').submit();
    }
    if (event.ctrlKey && event.key === 'x') {
      event.preventDefault();
      document.getElementById('close-terminal-btn').click();
    }
  });

  document.getElementById('nano-exit').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('close-terminal-btn').click();
  });
</script>

</body>
</html>
