<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Práctica — La SectASIR</title>
<link rel="icon" type="image/svg+xml" href="../img/favicon.svg?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
  /* Estilos específicos para el contenido inyectado */
  .markdown-content h2 { color: #60a5fa; margin-top: 30px; margin-bottom: 15px; }
  .markdown-content h3 { color: #93c5fd; margin-top: 25px; margin-bottom: 10px; }
  .markdown-content p { margin-bottom: 16px; line-height: 1.7; }
  .markdown-content ul { margin-bottom: 16px; padding-left: 20px; }
  .markdown-content li { margin-bottom: 8px; }
  .markdown-content pre { background: #1e293b; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 20px; border: 1px solid #334155; }
  .markdown-content code { font-family: var(--mono, 'JetBrains Mono', monospace); color: #a78bfa; }
  .markdown-content pre code { color: #e2e8f0; }
  .detail-callout { background: rgba(96, 165, 250, 0.1); border-left: 4px solid #60a5fa; padding: 16px; margin: 20px 0; border-radius: 0 8px 8px 0; }
  
  /* Estilo de los tags de tecnología */
  .stack-tag {
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 0.85rem;
    font-family: var(--mono, 'JetBrains Mono', monospace);
    color: #94a3b8;
  }

  /* MAGIA FRIKI: Animación y estilos del botón rojo */
  .tb-dot.r { 
    cursor: pointer; 
    transition: transform 0.1s ease, filter 0.2s ease, box-shadow 0.2s ease; 
  }
  .tb-dot.r:hover { 
    filter: brightness(1.3); 
    box-shadow: 0 0 8px rgba(239, 68, 68, 0.8); 
  }
  .tb-dot.r:active { 
    transform: scale(0.9); 
  }

  @keyframes minimizeTerminal {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(0.98); opacity: 1; }
    100% { transform: scale(0.4) translateY(200px); opacity: 0; }
  }

  .minimize-animation {
    animation: minimizeTerminal 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    transform-origin: center bottom; /* El efecto de succión hacia abajo */
  }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <a href="../index.html" class="nav-brand">
      La <span class="brand-accent">SectASIR</span>
      <img src="../img/favicon.svg" alt="Logo SectASIR" width="28" height="28" class="nav-logo">
    </a>
    <div class="nav-links">
      <a href="../sobre-mi.html">sobre-mi</a>
      <a href="../index.html#practicas">practicas</a>
      <a href="../contacto.html">contacto</a>
    </div>
  </div>
</nav>

<main class="wrap" style="padding: 40px 0; min-height: 75vh; display: flex; flex-direction: column; align-items: center;">
  
  <div style="width: 100%; max-width: 1200px;">
    
    <a href="../index.html#practicas" style="display: inline-flex; align-items: center; gap: 8px; background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: var(--mono, 'JetBrains Mono', monospace); margin-bottom: 24px; text-decoration: none; transition: all 0.2s;" onmouseover="this.style.color='#f8fafc'; this.style.backgroundColor='rgba(255,255,255,0.05)';" onmouseout="this.style.color='#94a3b8'; this.style.backgroundColor='transparent';">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      cd .. (volver a inicio)
    </a>

    <div id="main-terminal" class="terminal-window" style="box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: none !important;">
      <div class="terminal-titlebar">
        <span class="tb-dot r" id="close-terminal-btn" title="Cerrar ventana y volver"></span><span class="tb-dot y"></span><span class="tb-dot g"></span>
        <span>cat practica.md</span>
      </div>
      
      <div class="terminal-body" style="padding: 50px; background: #0f172a;">
        
        <h1 id="practica-titulo" style="margin-top: 0; color: #f8fafc; font-size: 2.2rem; margin-bottom: 20px;">Cargando...</h1>
        
        <div style="margin-bottom: 40px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #1e293b;">
          <span style="color: #94a3b8; font-family: var(--mono, 'JetBrains Mono', monospace); font-size: 0.95rem;">Fecha: <span id="practica-fecha" style="color: #60a5fa;">...</span></span>
          <span style="color: #334155;">|</span>
          <div id="practica-tags" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
        </div>

        <div id="practica-contenido" class="markdown-content" style="color: #cbd5e1; font-size: 1.1rem;">
          </div>

      </div>
    </div>
  </div>
</main>

<footer>
  <span style="color: #4ade80;">pedrooliver@asir</span>:<span style="color: #60a5fa;">~/la_sectasir</span> <span style="color: #c084fc;">(admin)</span>$ echo "La SectASIR — gracias por pasarte" — última actualización: junio 2026
</footer>

<script src="../js/practicas-data.js"></script>
<script src="../js/render.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const closeBtn = document.getElementById('close-terminal-btn');
    const terminalApp = document.getElementById('main-terminal');

    if (closeBtn && terminalApp) {
      closeBtn.addEventListener('click', () => {
        // 1. Añadimos la clase que dispara la animación CSS
        terminalApp.classList.add('minimize-animation');
        
        // 2. Esperamos exactamente los 400ms que dura la animación antes de redirigir
        setTimeout(() => {
          window.location.href = '../index.html#practicas';
        }, 400);
      });
    }
  });
</script>

</body>
</html>
